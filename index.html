<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07090F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RAW Entry">
<title>RAW Entry</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════
   SISTEMA DE COLOR — 90% blanco / 10% cyan
═══════════════════════════════════════ */
:root{
  /* Fondos */
  --bg:      #07090F;
  --bg2:     #0C0F18;
  --card:    rgba(255,255,255,.03);
  --card2:   rgba(255,255,255,.05);

  /* Blancos */
  --t:       #F5F5F7;        /* texto principal */
  --t2:      rgba(255,255,255,.55); /* texto secundario */
  --t3:      rgba(255,255,255,.25); /* texto terciario */
  --border:  rgba(255,255,255,.08);
  --border2: rgba(255,255,255,.14);
  --glow:    rgba(255,255,255,.06);

  /* Acento 10% — cyan */
  --p:       #22D3EE;  /* cyan principal */
  --p2:      rgba(34,211,238,.15);
  --p3:      rgba(34,211,238,.06);

  /* Estados */
  --ok:      #34D399;  /* verde esmeralda */
  --err:     #F87171;  /* rojo suave */

  /* Tipografía */
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;

  /* Espaciado */
  --pad: 18px;
  --rad: 18px;
}

/* ═══════════════════════════════════════
   RESET
═══════════════════════════════════════ */
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html,body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--t);
  min-height:100%;
  overflow-x:hidden;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════
   PARTÍCULAS — estrellas que parpadean
═══════════════════════════════════════ */
#pts{
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
  overflow:hidden;
}
.star{
  position:absolute;
  border-radius:50%;
  background:#fff;
  animation:twinkle var(--dur) var(--delay) ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{ opacity:0; transform:scale(.6) }
  50%{ opacity:var(--op); transform:scale(1) }
}
/* Algunas estrellas con glow cyan */
.star.accent{
  background:var(--p);
  box-shadow:0 0 6px var(--p), 0 0 12px rgba(34,211,238,.3);
}

/* ═══════════════════════════════════════
   APP CONTAINER
═══════════════════════════════════════ */
.app{
  position:relative; z-index:1;
  max-width:480px; margin:0 auto;
  min-height:100vh;
  display:flex; flex-direction:column;
}

/* ═══════════════════════════════════════
   HERO — barra superior
═══════════════════════════════════════ */
.hero{
  padding:16px var(--pad) 20px;
  position:relative;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(255,255,255,.025) 0%,transparent 100%);
}
.hero::before{
  content:'';position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 50% -20%,rgba(34,211,238,.06) 0%,transparent 70%);
  pointer-events:none;
}

/* Fila top */
.hero-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
  position:relative;z-index:1;
}
.hero-brand{display:flex;align-items:center;gap:10px}
.hero-icon{
  width:38px;height:38px;border-radius:11px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--t2);
  position:relative;flex-shrink:0;
  backdrop-filter:blur(10px);
}
.hero-icon::after{
  content:'';position:absolute;inset:0;
  border-radius:11px;
  box-shadow:0 0 20px rgba(34,211,238,.08);
}
.hero-name{
  font-size:15px;font-weight:600;
  letter-spacing:-.02em;color:var(--t);
}
.hero-sub{font-size:11px;color:var(--t3);letter-spacing:.3px;margin-top:1px}
.hero-ver{font-size:9px;color:var(--t3);letter-spacing:.5px;margin-left:5px}
.hero-actions{display:flex;align-items:center;gap:8px}

/* Chip estado */
.chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(10px);
  letter-spacing:.2px;
  transition:all .3s;
}
.chip-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--t3);flex-shrink:0;
}
.chip.ok .chip-dot{background:var(--ok);box-shadow:0 0 6px var(--ok);animation:blink 2.5s ease-in-out infinite}
.chip.ok{border-color:rgba(52,211,153,.2);color:var(--ok)}
.chip.load .chip-dot{background:var(--p);animation:blink 1s ease-in-out infinite}
.chip.load{border-color:rgba(34,211,238,.2);color:var(--p)}
.chip.err .chip-dot{background:var(--err)}
.chip.err{border-color:rgba(248,113,113,.2);color:var(--err)}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* Botón refresh */
.btn-rf{
  width:34px;height:34px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--t3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .2s;
}
.btn-rf:hover{color:var(--t);border-color:var(--border2)}
.btn-rf.spinning i{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Saldo */
.hero-saldo{position:relative;z-index:1}
.saldo-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:6px;
}
.saldo-lbl{
  font-size:10px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--t3);
}
.saldo-fecha{
  font-size:10px;color:var(--t3);
  background:none;border:none;font-family:var(--font);
  cursor:pointer;outline:none;-webkit-appearance:none;
}
.saldo-fecha::-webkit-calendar-picker-indicator{
  filter:invert(.3);cursor:pointer;width:10px;opacity:.5;
}
.saldo-btn-rf{
  background:none;border:none;color:var(--t3);
  cursor:pointer;font-size:11px;padding:2px;
  transition:color .2s;
}
.saldo-btn-rf:hover{color:var(--p)}
.saldo-val{
  font-size:48px;font-weight:700;
  letter-spacing:-.04em;line-height:1;
  font-variant-numeric:tabular-nums;
  color:var(--t);transition:color .3s;
}
.saldo-val.pos{color:var(--p)}
.saldo-val.neg{color:var(--err)}
.saldo-val.ld{color:var(--t3);font-size:36px}
.saldo-clock{
  font-size:11px;color:var(--t3);
  margin-top:5px;font-variant-numeric:tabular-nums;
  letter-spacing:.5px;
}

/* ═══════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════ */
.prog-wrap{height:1px;background:var(--border);overflow:hidden;flex-shrink:0}
.prog-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,transparent,var(--p),transparent);
  transition:width .3s;
}
.prog-bar.ind{
  width:40%;
  animation:progSlide 1.2s ease-in-out infinite;
}
@keyframes progSlide{
  0%{transform:translateX(-200%)}
  100%{transform:translateX(350%)}
}

/* ═══════════════════════════════════════
   SECCIONES
═══════════════════════════════════════ */
.sections{
  flex:1;
  padding:12px var(--pad) 40px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;gap:8px;
}
.sections::-webkit-scrollbar{display:none}

.sec{
  border:1px solid var(--border);
  border-radius:var(--rad);
  background:var(--card);
  backdrop-filter:blur(20px);
  overflow:hidden;
  transition:border-color .25s;
}
.sec:hover{border-color:var(--border2)}

/* Header de sección */
.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px var(--pad);
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
}
.sec-hdr.open{border-bottom:1px solid var(--border)}
.sec-hdr-l{display:flex;align-items:center;gap:10px}
.sec-ico{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.sec-ico.w{background:rgba(255,255,255,.07);color:var(--t2)}
.sec-ico.c{background:rgba(34,211,238,.1);color:var(--p)}
.sec-ico.g{background:rgba(52,211,153,.1);color:var(--ok)}
.sec-name{font-size:15px;font-weight:600;color:var(--t);letter-spacing:-.01em}
.sec-hdr-r{display:flex;align-items:center;gap:10px}
.sec-val{
  font-size:15px;font-weight:700;
  font-variant-numeric:tabular-nums;
  color:var(--t2);
}
.sec-val.pos{color:var(--ok)}
.sec-chev{
  font-size:11px;color:var(--t3);
  transition:transform .22s;
}
.sec-hdr.open .sec-chev{transform:rotate(180deg)}

.sec-body{display:none}
.sec-body.open{display:block;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════
   NUEVA ENTRADA — campos
═══════════════════════════════════════ */
.field{
  display:flex;align-items:center;
  padding:14px var(--pad);
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background .15s;
  position:relative;gap:4px;
}
.field:last-of-type{border-bottom:none}
.field:active{background:rgba(255,255,255,.03)}
.field-bar{
  position:absolute;left:0;top:8px;bottom:8px;
  width:2px;border-radius:0 2px 2px 0;
  background:transparent;transition:background .2s;
}
.field.active .field-bar{background:var(--p)}
.field.done .field-bar{background:rgba(52,211,153,.6)}
.field-lbl{
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;
  color:var(--t3);width:90px;flex-shrink:0;
}
.field-val{
  flex:1;font-size:14px;font-weight:500;
  color:var(--t);padding:0 6px;
  white-space:nowrap;overflow:hidden;
}
.field-val.empty{color:var(--t3)}
.field-chev{font-size:10px;color:var(--t3);flex-shrink:0;transition:transform .2s}
.field.active .field-chev{transform:rotate(180deg);color:var(--p)}

.field-expand{
  max-height:0;overflow:hidden;
  transition:max-height .28s cubic-bezier(.4,0,.2,1);
}
.field.active .field-expand{max-height:420px}
.field-expand-inner{padding:10px var(--pad) 14px}

/* Inputs */
.finput{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:10px;
  color:var(--t);font-family:var(--font);
  font-size:15px;padding:11px 13px;outline:none;
  transition:border-color .17s;
  -webkit-appearance:none;
}
.finput:focus{border-color:rgba(34,211,238,.4);box-shadow:0 0 0 3px rgba(34,211,238,.06)}
.finput[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(.4);cursor:pointer;
}

/* Botones de opción */
.opts{display:flex;flex-wrap:wrap;gap:5px}
.opt{
  padding:7px 12px;border-radius:8px;
  font-size:12px;font-weight:600;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--t3);cursor:pointer;
  transition:all .15s;font-family:var(--font);
  letter-spacing:.2px;
}
.opt:hover{border-color:var(--border2);color:var(--t)}
.opt.on{
  background:rgba(34,211,238,.1);
  border-color:rgba(34,211,238,.35);
  color:var(--p);
}

/* Monto */
.monto-wrap{position:relative}
.monto-signs{
  position:absolute;left:0;top:0;bottom:0;
  display:flex;align-items:center;padding:0 8px;gap:4px;z-index:2;
}
.msign{
  border:1px solid var(--border);border-radius:7px;
  background:none;color:var(--t3);
  font-size:16px;font-weight:700;cursor:pointer;
  padding:4px 9px;line-height:1;
  transition:all .15s;font-family:var(--font);
}
.msign:hover{border-color:var(--border2);color:var(--t)}
.msign.pos{color:var(--ok);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06)}
.msign.neg{color:var(--err);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.06)}
.monto-wrap .finput{padding-left:88px;font-size:20px;font-weight:700}
.mprev{font-size:12px;text-align:right;margin-top:5px;color:var(--t3);font-weight:600}
.mprev.pos{color:var(--ok)}.mprev.neg{color:var(--err)}

/* Acciones del form */
.form-actions{
  display:flex;align-items:center;gap:8px;
  padding:12px var(--pad);
  border-top:1px solid var(--border);
}
.btn-save{
  flex:1;padding:12px;border-radius:11px;
  background:rgba(255,255,255,.07);
  border:1px solid var(--border2);
  color:var(--t);font-family:var(--font);
  font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;letter-spacing:.2px;
}
.btn-save:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;border:none;
  font-family:var(--font);transition:all .17s;flex-shrink:0;
}
.btn-sm.sec{background:rgba(255,255,255,.04);color:var(--t3);border:1px solid var(--border)}
.btn-sm.sec:hover{color:var(--t);border-color:var(--border2)}
.btn-sm.suc{background:rgba(52,211,153,.07);color:var(--ok);border:1px solid rgba(52,211,153,.2)}
.btn-sm.lnk{background:rgba(34,211,238,.07);color:var(--p);border:1px solid rgba(34,211,238,.2)}
.spin-sm{
  width:13px;height:13px;
  border:1.5px solid rgba(255,255,255,.2);
  border-top-color:var(--t);border-radius:50%;
  animation:spin .65s linear infinite;display:none;
}

/* Resultado */
.save-res{
  margin:0 var(--pad) 10px;padding:9px 13px;
  border-radius:9px;font-size:12px;font-weight:600;
  display:none;align-items:center;gap:7px;
}
.save-res.ok{display:flex;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);color:var(--ok)}
.save-res.err{display:flex;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:var(--err)}

/* ═══════════════════════════════════════
   ENTES
═══════════════════════════════════════ */
.ente-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px var(--pad);border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.ente-row:last-child{border-bottom:none}
.ente-row:active{background:rgba(255,255,255,.03)}
.ente-nombre{font-size:14px;font-weight:600;color:var(--t)}
.ente-right{display:flex;align-items:center;gap:8px}
.ente-monto{
  font-size:17px;font-weight:700;
  font-variant-numeric:tabular-nums;color:var(--t2);
}
.ente-monto.pos{color:var(--ok)}.ente-monto.neg{color:var(--err)}.ente-monto.z{color:var(--t3)}
.ente-fecha{font-size:10px;color:var(--t3)}
.ente-edit{
  display:none;padding:10px var(--pad) 14px;
  background:rgba(255,255,255,.02);border-top:1px solid var(--border);
}
.ente-edit.open{display:flex;align-items:center;gap:8px}
.ente-edit input{
  flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:8px;color:var(--t);font-family:var(--font);font-size:16px;
  padding:9px 12px;outline:none;text-align:right;font-weight:700;
}
.ente-edit input:focus{border-color:rgba(34,211,238,.4)}
.btn-check{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,.06);border:1px solid var(--border2);
  color:var(--t);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .17s;flex-shrink:0;
}
.btn-check:hover{background:rgba(255,255,255,.1)}

/* ═══════════════════════════════════════
   CARDS GRID (móvil Anualidad/Gastos)
═══════════════════════════════════════ */
.cards-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;padding:12px;
}
.kard{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:14px;padding:14px;
  display:flex;flex-direction:column;gap:5px;
  cursor:pointer;transition:border-color .2s;
  position:relative;overflow:hidden;
}
.kard::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.03) 0%,transparent 70%);
  pointer-events:none;
}
.kard:active{border-color:var(--border2)}
.kard-name{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.1px}
.kard-val{
  font-size:18px;font-weight:700;
  font-variant-numeric:tabular-nums;line-height:1.1;
  color:var(--t);
}
.kard-val.pos{color:var(--ok)}.kard-val.neg{color:var(--err)}.kard-val.z{color:var(--t3)}
.kard-prog{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin:2px 0}
.kard-prog-fill{height:100%;background:var(--p);border-radius:1px}
.kard-meta{font-size:10px;color:var(--t3)}
.kard-chev{float:right;font-size:10px;color:var(--t3)}
/* Desplegable dentro de kard */
.kard-detail{
  display:none;
  margin:8px -14px -14px;
  border-top:1px solid var(--border);
}
.kard-detail.open{display:block}
.kard-detail-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04);
}
.kard-detail-row:last-child{border-bottom:none}
.kard-detail-lbl{font-size:11px;color:var(--t3);font-weight:500}
.kard-detail-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.kard-detail-val.pos{color:var(--ok)}.kard-detail-val.neg{color:var(--err)}

/* ═══════════════════════════════════════
   TABLA DESKTOP
═══════════════════════════════════════ */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:3px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tbl{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:12px}
.tbl th{
  padding:8px 14px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.7px;color:var(--t3);
  background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:2;white-space:nowrap;text-align:right;
}
.tbl th:first-child{text-align:left;position:sticky;left:0;z-index:4;border-right:1px solid var(--border)}
.tbl td{
  padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.03);
  font-variant-numeric:tabular-nums;white-space:nowrap;
  text-align:right;color:var(--t3);
}
.tbl td:first-child{
  text-align:left;font-weight:600;color:var(--t2);
  position:sticky;left:0;background:rgba(7,9,15,.95);
  border-right:1px solid var(--border);z-index:1;
}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl td.pos{color:var(--ok);font-weight:600}
.tbl td.neg{color:var(--err);font-weight:600}
.tbl td.z{color:var(--t3);opacity:.35}
.tbl th.mes-act,.tbl td.mes-act{
  background:rgba(34,211,238,.05) !important;
}
.tbl th.mes-act{color:var(--p) !important;border-bottom:1px solid rgba(34,211,238,.3) !important}

/* ═══════════════════════════════════════
   POPUP CONCEPTO
═══════════════════════════════════════ */
.popup-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);backdrop-filter:blur(10px);
  z-index:800;display:none;align-items:flex-end;justify-content:center;
}
.popup-overlay.show{display:flex}
.popup-sheet{
  background:#0E1220;border-radius:20px 20px 0 0;
  width:100%;max-width:480px;max-height:88vh;
  display:flex;flex-direction:column;
  border:1px solid var(--border);border-bottom:none;

═══════════════════════════════════════ */

}

.panel{
  position:fixed;top:0;right:0;bottom:0;width:340px;

  z-index:400;transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.panel.open{transform:translateX(0)}
.panel-handle{
  width:36px;height:3px;background:var(--border2);
  border-radius:2px;margin:12px auto 0;flex-shrink:0;
  cursor:pointer;
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.panel-title{font-size:13px;font-weight:600;color:var(--t)}

═══════════════════════════════════════ */
.toast{

<script>
// Detectar móvil y aplicar .mob ANTES de render
(function(){
  if(/iPhone|iPad|iPod|Android.*Mobile/.test(navigator.userAgent)){
    document.documentElement.classList.add('mob');
  }
})();

// ══════════════════════════════════════════
//  API HÍBRIDA
//  - En GAS: usa google.script.run
//  - En GitHub Pages: usa fetch()
// ══════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbytz5U_TaaE61H85pBdAsk_UUpMIfuKYopYH0kTzANJmCy8YYEfYO36uDRHhL6wI0maxw/exec';

// Detectar si estamos en GAS o en GitHub Pages
// Detectar GAS de forma robusta
const EN_GAS = (function(){
  try {
    return typeof google !== 'undefined' 
      && typeof google.script !== 'undefined'
      && typeof google.script.run !== 'undefined';
  } catch(e){ return false; }
})();

// Si no estamos en GAS y no hay URL configurada, mostrar aviso
// URL configurada

function gasRun(fn, ...args) {
  return new Promise((resolve, reject) => {
    const runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(e => { console.error(fn, e); reject(e); });
    // google.script.run requiere llamada directa por nombre
    if (typeof runner[fn] === 'function') {
      runner[fn](...args);
    } else {
      reject(new Error('Función no encontrada: ' + fn));
    }
  });
}

async function apiGet(action, params={}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url);
  return r.json();
}

async function apiPost(action, data={}) {
  const r = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action, ...data })
  });
  return r.json();
}

// Wrapper unificado — funciona en GAS y GitHub
const api = {
  getCatalogos:      () => EN_GAS ? gasRun('getCatalogos') : apiGet('getCatalogos'),
  getSheetUrl:       () => EN_GAS ? gasRun('getSheetUrl').then(u=>({url: typeof u==='string'?u:u.url})) : apiGet('getSheetUrl'),
  getFijos:          () => EN_GAS ? gasRun('getFijos') : apiGet('getFijos'),
  getDatosMes:       () => EN_GAS ? gasRun('getDatosMes') : apiGet('getDatosMes'),
  getGastos:         () => EN_GAS ? gasRun('getGastos') : apiGet('getGastos'),
  getSaldoDia:       (f) => EN_GAS ? gasRun('getSaldoDia', f) : apiGet('getSaldoDia', { fecha: f }),
  getListaEstructura:() => EN_GAS ? gasRun('getListaEstructura') : apiGet('getListaEstructura'),
  insertarEnRAW:     (d) => EN_GAS ? gasRun('insertarEnRAW', d) : apiPost('insertarEnRAW', { data: d }),
  actualizarFijo:    (fila, monto) => EN_GAS ? gasRun('actualizarFijo', fila, monto) : apiPost('actualizarFijo', { fila, monto }),
  agregarALista:     (colIndex, valor) => EN_GAS ? gasRun('agregarALista', colIndex, valor) : apiPost('agregarALista', { colIndex, valor }),
};

// ══════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════
const CAMPOS=['fecha','proyecto','contacto','concepto','monto','recurrencia','clave'];
const MESES_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let sign=1, cats={}, proxSel='', contactoSel='', recSel='', sheetUrl='';
let datosMes={meses:[],grupos:{}};
let _toast=null;

// ══════════════════════════════════════════
//  PARTÍCULAS
// ══════════════════════════════════════════
(()=>{
  const c=document.getElementById('pts');
  if(!c)return;

  const types=['blue','blue','blue','cyan','cyan','white'];

function fmtD(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtDisplay(str){if(!str)return'';const p=str.split('-');return`${p[2]}/${p[1]}/${p[0]}`;}
function fmtShort(str){if(!str)return'';const p=str.split('-');return p.length===3?`${p[2]}/${p[1]}`:''}

function fmtMoneda(v){
  if(v===null||v===undefined||v==='')return{txt:'—',cls:'z'};
  const n=Number(v);if(isNaN(n))return{txt:'—',cls:'z'};
  if(n===0)return{txt:'$ 0',cls:'z'};
  const abs='$ '+Math.abs(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n>0?{txt:abs,cls:'pos'}:{txt:'− '+abs,cls:'neg'};
}

function setChip(t,txt){

function showToast(msg,ok=true){
  const t=document.getElementById('toast');
  t.className='toast '+(ok?'ok':'err');
  t.querySelector('i').className=ok?'fas fa-circle-check':'fas fa-circle-xmark';
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  clearTimeout(_toast);
  _toast=setTimeout(()=>t.classList.remove('show'),2800);
}

function renderConceptoPopup(q){
  const items=(cats.conceptos||[]).filter(i=>!q||i.toLowerCase().includes(q.toLowerCase()))
    .sort((a,b)=>a.localeCompare(b,'es',{sensitivity:'base'}));
  const body=document.getElementById('pop-body');

  items.forEach(it=>{const l=it[0].toUpperCase().replace(/[^A-Z0-9]/,'#');if(!grupos[l])grupos[l]=[];grupos[l].push(it);});
  body.innerHTML=Object.keys(grupos).sort().map(l=>`
    <div class="pop-grupo-lbl">${l}</div>
    <div class="pop-items">${grupos[l].map(it=>`
      <div class="pop-item${it===actual?' on':''}" onclick="selConcepto('${it.replace(/'/g,"\\'")}')">${it}</div>

//  GUARDAR
// ══════════════════════════════════════════
function guardar(){
  const fecha=document.getElementById('fecha').value;
  const concepto=document.getElementById('cv-concepto').classList.contains('empty')?'':document.getElementById('cv-concepto').textContent.trim();
  const monto=(parseFloat(document.getElementById('monto').value)||0)*sign;
  const errs=[];
  if(!fecha)errs.push('Fecha');
  if(!proxSel)errs.push('Proyecto');
  if(!contactoSel)errs.push('Contacto');
  if(!concepto)errs.push('Concepto');
  if(monto===0)errs.push('Monto');
  if(!recSel)errs.push('Recurrencia');
  if(errs.length){
    mostrarRes(false,'Faltan: '+errs.join(', '));
    errs.forEach(e=>{
      const m={Fecha:'fecha',Proyecto:'proyecto',Contacto:'contacto',Concepto:'concepto',Monto:'monto',Recurrencia:'recurrencia'};
      const el=document.getElementById('cf-'+m[e]);
      if(el){el.style.outline='1px solid var(--err)';setTimeout(()=>el.style.outline='',2000);}
    });
    return;
  }
  ocultarRes();progStart();setBtn(true);
  api.insertarEnRAW({fecha,proyecto:proxSel,contacto:contactoSel,concepto,monto,recurrencia:recSel,clave:document.getElementById('clave').value.trim()})
    .then(r=>{
      progDone();setBtn(false);
      mostrarRes(r.ok,r.mensaje);
      showToast(r.ok?'✓ Guardado':'Error al guardar',r.ok);
      if(r.ok){
        limpiar(false);consultarSaldo();
        api.getFijos().then(renderEntes);
        api.getGastos().then(renderAnualidad);
        api.getDatosMes().then(onDatosMes);
      }
    })
    .catch(e=>{progDone();setBtn(false);mostrarRes(false,'Error: '+e.message);showToast('Error',false);});
}

function renderEntes(data){
  const body=document.getElementById('entes-list');
  if(!data||!data.length){body.innerHTML='<div style="padding:16px;color:var(--t3);text-align:center">Sin datos</div>';return;}
  const total=data.reduce((s,f)=>s+(f.monto||0),0);
  const {txt:tt,cls:tc}=fmtMoneda(total);
  document.getElementById('entes-total').textContent=tt;
  document.getElementById('entes-total').className='sec-hdr-val '+tc;
  body.innerHTML=data.map(f=>{
    const {txt,cls}=fmtMoneda(f.monto);
    return `<div class="ente-row" onclick="togEnteEdit(${f.fila})">
      <div class="ente-nombre">${f.nombre}</div>
      <div class="ente-right">
        <div class="ente-monto ${cls}" id="em-${f.fila}">${txt}</div>
        <div class="ente-fecha">${f.fecha}</div>
      </div>
    </div>
    <div class="ente-edit" id="ee-${f.fila}">
      <input type="number" value="${f.monto!==null?f.monto:''}" step="0.01" inputmode="decimal"
        id="ei-${f.fila}" placeholder="0.00"
        onkeydown="if(event.key==='Enter')guardarEnte(${f.fila});if(event.key==='Escape')togEnteEdit(${f.fila})">
      <button class="btn-check" id="ec-${f.fila}" onclick="guardarEnte(${f.fila})"><i class="fas fa-check" id="ei-ico-${f.fila}"></i></button>
    </div>`;
  }).join('');
}
function togEnteEdit(fila){
  const ee=document.getElementById('ee-'+fila);
  const isOpen=ee.classList.contains('open');
  document.querySelectorAll('.ente-edit').forEach(e=>e.classList.remove('open'));
  if(!isOpen){ee.classList.add('open');document.getElementById('ei-'+fila).focus();}
}
function guardarEnte(fila){
  const inp=document.getElementById('ei-'+fila);
  const val=parseFloat(inp.value);if(isNaN(val))return;
  const ico=document.getElementById('ei-ico-'+fila);
  ico.className='fas fa-circle-notch fa-spin';
  api.actualizarFijo(fila,val)
    .then(r=>{
      ico.className='fas fa-check';
      if(r.ok){
        const {txt,cls}=fmtMoneda(val);
        const em=document.getElementById('em-'+fila);
        if(em){em.textContent=txt;em.className='ente-monto '+cls;}
        togEnteEdit(fila);
        api.getFijos().then(renderEntes);
      }
    })
    .catch(()=>{ico.className='fas fa-check';});
}

// ══════════════════════════════════════════
//  ANUALIDAD (Gastos K:P)
// ══════════════════════════════════════════
function renderAnualidad(data){
  const body=document.getElementById('anualidad-body');
  if(!data.ok||!data.grupos||!data.grupos.length){
    body.innerHTML='<div style="padding:16px;color:var(--t3);text-align:center">Sin datos</div>';return;
  }
  const esMob=document.documentElement.classList.contains('mob')||window.innerWidth<900;
  if(esMob){
    // Grid de cards con desplegable por mes
    const mesActualIdx = new Date().getMonth();
    const uid = 'an'+Date.now();
    const cards = data.grupos.map((g,gi)=>{
      const isPagado = it => it.pagado==='Sí'||it.pagado==='Si'||it.pagado==='sí';
      const pagados = g.items.filter(isPagado).length;
      const tot = g.items.filter(it=>it.monto!==null).length;
      // Total solo hasta mes actual
      const totalHoy = g.items.reduce((s,it)=>{
        if(it.monto===null) return s;
        const claveL=(it.clave||'').toLowerCase();
        const MIDX={enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11};
        const m=Object.keys(MIDX).find(k=>claveL.includes(k));
        if(m && MIDX[m]>mesActualIdx) return s;
        return s+(it.monto||0);
      },0);
      const {txt,cls}=fmtMoneda(totalHoy||null);
      const pct=Math.round(pagados/12*100);
      const cardId=uid+'_'+gi;
      const border=pagados>0?'rgba(34,197,94,.3)':'var(--border)';
      // Filas de meses desplegables
      const mesesRows=g.items.map(it=>{
        const pag=isPagado(it);
        const {txt:mtxt}=fmtMoneda(it.monto);
        return `<div style="display:flex;justify-content:space-between;align-items:center;
          padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.05)">
          <span style="font-size:13px;color:var(--t3);font-weight:600">${it.clave}</span>
          <span style="font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;
            color:${pag?'var(--ok)':'var(--err)'}">${pag?'✓ ':''}${mtxt}</span>
        </div>`;
      }).join('');
      return `<div class="kard" style="border-color:${border};cursor:pointer"
        onclick="togKard('${cardId}')">
        <div class="kard-name">${g.concepto}
          <span class="kard-chev" style="float:right;font-size:11px;color:var(--t3)">▾</span>
        </div>
        <div class="kard-val ${pagados>0?'pos':cls}">${txt}</div>
        <div class="kard-prog"><div class="kard-prog-fill" style="width:${pct}%"></div></div>
        <div class="kard-meta">${pagados}/12 pagados</div>
        <div id="${cardId}" class="kard-detail">${mesesRows}</div>
      </div>`;
    }).join('');
    body.innerHTML=`<div class="cards-grid">${cards}</div>`;
  } else {
    // Tabla desktop: Concepto × Clave
    const claves=[...new Set(data.grupos.flatMap(g=>g.items.map(it=>it.clave)))];
    const idx={};data.grupos.forEach(g=>{idx[g.concepto]={};g.items.forEach(it=>idx[g.concepto][it.clave]=it);});
    const mesActual=MESES_ES[new Date().getMonth()];
    const thead=`<tr><th>Concepto</th>${claves.map(c=>{
      const esA=c.toUpperCase()===mesActual.toUpperCase();
      return `<th class="${esA?'mes-actual':''}" style="text-align:center">${c}</th>`;
    }).join('')}</tr>`;
    const tbody=data.grupos.map(g=>{
      const celdas=claves.map(clave=>{
        const it=idx[g.concepto][clave];
        if(!it)return`<td style="text-align:center;color:var(--dim)">—</td>`;
        const {txt,cls}=fmtMoneda(it.monto);
        const pag=it.pagado==='Sí'||it.pagado==='Si'||it.pagado==='sí';
        const esA=clave.toUpperCase()===mesActual.toUpperCase();
        const colorCls = pag ? 'pos' : cls;
        return `<td class="${colorCls}${esA?' mes-actual':''}" style="text-align:center">
          <div>${txt}</div>
          <div style="font-size:10px;color:${pag?'var(--ok)':'var(--err)'};margin-top:2px">${pag?'✓':'✗'}</div>
        </td>`;
      }).join('');
      return `<tr><td>${g.concepto}</td>${celdas}</tr>`;
    }).join('');
    body.innerHTML=`<div class="tbl-wrap"><table class="tbl"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
  }
}

//  GASTOS POR MES
// ══════════════════════════════════════════
function onDatosMes(data){datosMes=data;renderGastos();}
function renderGastos(){
  const body=document.getElementById('gastos-body');
  const data=datosMes;
  if(!data.meses||!data.meses.length){
    body.innerHTML='<div style="padding:16px;color:var(--t3);text-align:center">Sin datos</div>';return;
  }
  const esMob=document.documentElement.classList.contains('mob')||window.innerWidth<900;
  const mesActual=MESES_ES[new Date().getMonth()];

  if(esMob){
    // Reorganizar: por ENTE, dentro los meses
    const entesSet=new Set();
    data.meses.forEach(m=>(data.grupos[m]||[]).forEach(e=>entesSet.add(e.ente)));
    const entes=[...entesSet];
    const idx={};
    data.meses.forEach(mes=>{
      idx[mes]={};
      (data.grupos[mes]||[]).forEach(e=>idx[mes][e.ente]={monto:e.monto,inicio:e.inicio,fin:e.fin});
    });
    const uid2 = 'gs_'+Date.now();
    const cards = entes.map((ente,ei)=>{
      const cardId = uid2+'_'+ei;
      // Total del ente a través de todos los meses
      // Final y P muestran solo el mes actual; el resto acumula hasta hoy
      const entesMesActual = ['Final','P'];
      let total=0;
      if(entesMesActual.includes(ente)){
        total=idx[mesActual]?.[ente]?.monto||0;
      } else {
        data.meses.forEach(m=>{
          const mIdx=MESES_ES.indexOf(m);
          if(mIdx<=new Date().getMonth()) total+=idx[m]?.[ente]?.monto||0;
        });
      }
      const {txt,cls}=fmtMoneda(total||null);
      // Meses de este ente
      const mesesHTML = data.meses.map(mes=>{
        const item=idx[mes]?.[ente];
        if(!item||item.monto===null) return '';
        const {txt:mtxt,cls:mcls}=fmtMoneda(item.monto);
        const esActual=mes.toUpperCase()===mesActual.toUpperCase();
        return `<div style="display:flex;justify-content:space-between;align-items:center;
          padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.05);
          ${esActual?'background:rgba(59,130,246,.08)':''}">
          <span style="font-size:13px;font-weight:${esActual?'700':'500'};
            color:${esActual?'var(--p)':'var(--t3)'}">${mes}${esActual?' 📍':''}</span>
          <span style="font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;
            color:${mcls==='pos'?'var(--ok)':mcls==='neg'?'var(--err)':'var(--t3)'}">${mtxt}</span>
        </div>`;
      }).filter(Boolean).join('');
      return `<div class="kard" style="cursor:pointer;grid-column:span 1"
          onclick="togKard('${cardId}')">
        <div class="kard-name">${ente}
          <span class="kard-chev" style="float:right;font-size:11px;color:var(--t3);font-weight:400">▾</span>
        </div>
        <div class="kard-val ${cls}">${txt}</div>
        <div id="${cardId}" class="kard-detail">${mesesHTML}</div>
      </div>`;
    }).join('');
    body.innerHTML=`<div class="cards-grid">${cards}</div>`;
  } else {
    // Tabla desktop: Ente × Mes
    const entesSet=new Set();
    data.meses.forEach(m=>(data.grupos[m]||[]).forEach(e=>entesSet.add(e.ente)));
    const entes=[...entesSet];
    const idx={};
    data.meses.forEach(mes=>{idx[mes]={};(data.grupos[mes]||[]).forEach(e=>idx[mes][e.ente]=e.monto);});
    const thead=`<tr><th>Ente</th>${data.meses.map(m=>{
      const esA=m.toUpperCase()===mesActual.toUpperCase();
      return `<th class="${esA?'mes-actual':''}">${m}</th>`;
    }).join('')}</tr>`;
    const tbody=entes.map(ente=>{
      const celdas=data.meses.map(mes=>{
        const {txt,cls}=fmtMoneda(idx[mes]?.[ente]??null);
        const esA=mes.toUpperCase()===mesActual.toUpperCase();
        return `<td class="${cls}${esA?' mes-actual':''}">${txt}</td>`;
      }).join('');
      return `<tr><td>${ente}</td>${celdas}</tr>`;
    }).join('');
    body.innerHTML=`<div class="tbl-wrap"><table class="tbl"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
  }
}

// ══════════════════════════════════════════
//  PANEL GESTIONAR LISTA
// ══════════════════════════════════════════
const ICOS=['fa-folder','fa-user','fa-tag','fa-rotate','fa-calendar','fa-star'];
function oPanel(){
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('show');
  document.body.style.overflow='hidden';
  cargarPanel();
}
function cPanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('show');
  document.body.style.overflow='';
}
function cargarPanel(){
  const b=document.getElementById('panel-body');
  b.innerHTML='<div style="text-align:center;padding:24px;color:var(--t3)"><i class="fas fa-circle-notch fa-spin" style="color:var(--p);font-size:18px"></i></div>';
  api.getListaEstructura().then(renderPanel).catch(()=>{});
}
function renderPanel(data){
  const b=document.getElementById('panel-body');
  if(!data.columnas||!data.columnas.length){b.innerHTML='<div style="padding:16px;color:var(--t3)">Sin columnas</div>';return;}
  b.innerHTML=data.columnas.map((col,idx)=>`
    <div class="panel-group">
      <div class="panel-group-hdr">
        <div class="panel-group-name"><i class="fas ${ICOS[idx]||'fa-circle-dot'}"></i>${col.header}</div>
        <span class="panel-cnt" id="pc-${idx}">${col.count}</span>
      </div>
      <div class="panel-add">
        <input type="text" id="pi-${idx}" placeholder="Nuevo valor…" onkeydown="if(event.key==='Enter')addItem(${idx})">
        <button class="btn-add" onclick="addItem(${idx})"><i class="fas fa-plus"></i> Agregar</button>
      </div>
      <div class="panel-chips" id="pchips-${idx}">
        ${col.valores.map(v=>`<span class="chip">${v}</span>`).join('')}
      </div>
    </div>
  `).join('');
}
function addItem(idx){
  const inp=document.getElementById('pi-'+idx);
  const val=inp.value.trim();if(!val)return;
  inp.disabled=true;
  api.agregarALista(idx,val)
    .then(r=>{
      inp.disabled=false;inp.value='';
      if(r.ok){
        const chips=document.getElementById('pchips-'+idx);
        const ch=document.createElement('span');ch.className='chip new';ch.textContent=val;chips.appendChild(ch);
        const cnt=document.getElementById('pc-'+idx);cnt.textContent=parseInt(cnt.textContent)+1;
        const CMAP={0:'proyectos',1:'contactos',2:'conceptos',3:'recurrencias'};
        const key=CMAP[idx];
        if(key&&cats[key]&&!cats[key].includes(val)){
          cats[key].push(val);
          if(idx===0)buildOpts('sw-proyecto',cats.proyectos,v=>{proxSel=v;setFieldVal('proyecto',v);marcarDone('proyecto');avanzarA('proyecto');});
          else if(idx===1)buildOpts('sw-contacto',cats.contactos,v=>{contactoSel=v;setFieldVal('contacto',v);marcarDone('contacto');avanzarA('contacto');});
          else if(idx===3)buildOpts('sw-recurrencia',cats.recurrencias,v=>{recSel=v;setFieldVal('recurrencia',v);marcarDone('recurrencia');avanzarA('recurrencia');});
        }
      }
    })
    .catch(()=>{inp.disabled=false;});
}

// ══════════════════════════════════════════
//  REFRESH GLOBAL
// ══════════════════════════════════════════
function refreshTodo(){
  const btn=document.getElementById('btn-rf');
  btn.classList.add('spinning');btn.disabled=true;
  progStart();
  let n=4,done=0;
  const tick=()=>{done++;if(done>=n){btn.classList.remove('spinning');btn.disabled=false;progDone();showToast('Datos actualizados');}};
  consultarSaldo();tick();
  api.getFijos().then(d=>{renderEntes(d);tick();}).catch(tick);
  api.getGastos().then(d=>{renderAnualidad(d);tick();}).catch(tick);
  api.getDatosMes().then(d=>{onDatosMes(d);tick();}).catch(tick);
}

// ══════════════════════════════════════════
//  TOOLTIP GLOBAL
// ══════════════════════════════════════════
function initTooltip(){
  const tip=document.getElementById('gtip');
  let _t=null;
  document.addEventListener('mouseover',e=>{
    const el=e.target.closest('[title]');
    if(!el||!el.title)return;
    tip.textContent=el.title;tip.classList.add('show');
    const r=el.getBoundingClientRect();
    tip.style.left=Math.max(6,r.left+r.width/2-tip.offsetWidth/2)+'px';
    tip.style.top=(r.bottom+8)+'px';
  });
  document.addEventListener('mouseout',()=>tip.classList.remove('show'));
}

// Reloj en vivo — siempre
(function tickClock(){
  const el=document.getElementById('saldo-clock');
  if(el){
    const now=new Date();
    el.textContent=now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
  }
  setTimeout(tickClock,1000);
})();

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
